name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DHFT_BUILD_PYTHON_BRIDGE=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Benchmark snapshot
        if: runner.os == 'Linux'
        run: |
          ./build/bin/hft_main --benchmark | tee benchmark_output.txt
          python3 scripts/check_benchmark_threshold.py \
            --input benchmark_output.txt \
            --threshold-config benchmark/thresholds.json

      - name: Build benchmark history row
        if: runner.os == 'Linux'
        run: |
          python3 - <<'PY'
          from datetime import datetime, timezone
          import re

          metrics = {}
          pattern = re.compile(r"^([a-z_]+)=([0-9]+(?:\.[0-9]+)?)$")
          for line in open("benchmark_output.txt", "r", encoding="utf-8"):
              m = pattern.match(line.strip())
              if m:
                  metrics[m.group(1)] = m.group(2)

          date_utc = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          with open("ci_benchmark_history_row.csv", "w", encoding="utf-8") as out:
              out.write("date,environment,orders,elapsed_ms,orders_per_sec,notes\n")
              out.write(
              f"{date_utc},ci-linux-ubuntu-latest,"
                  f"{metrics.get('benchmark_orders', '')},"
                  f"{metrics.get('benchmark_elapsed_ms', '')},"
                  f"{metrics.get('benchmark_orders_per_sec', '')},"
              "generated by ci workflow run_id=${{ github.run_id }}\n"
              )
          PY

      - name: Upload benchmark artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output
          path: |
            benchmark_output.txt
            ci_benchmark_history_row.csv

  static-analysis:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++17 \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            src lib tests
