<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Price-Time Matching Sequence</title>
  <desc id="desc">A visual of limit order intake, validation, matching loop, and residual insertion.</desc>
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .step { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box { rx: 12; ry: 12; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="560" fill="#f8fafc"/>
  <text class="title" x="40" y="58">Order Lifecycle: Price-Time Priority</text>

  <rect class="box" x="70" y="130" width="240" height="100" fill="#dbeafe" stroke="#1d4ed8"/>
  <text class="step" x="98" y="170">1) LimitOrder(order)</text>
  <text class="small" x="98" y="195">buy/sell + price + qty + ts</text>

  <rect class="box" x="360" y="130" width="240" height="100" fill="#fee2e2" stroke="#b91c1c"/>
  <text class="step" x="390" y="170">2) Validate + ID check</text>
  <text class="small" x="390" y="195">reject invalid or duplicate</text>

  <rect class="box" x="650" y="130" width="240" height="100" fill="#dcfce7" stroke="#15803d"/>
  <text class="step" x="680" y="170">3) Match opposite side</text>
  <text class="small" x="680" y="195">best price, then oldest time</text>

  <rect class="box" x="940" y="130" width="210" height="100" fill="#ffedd5" stroke="#c2410c"/>
  <text class="step" x="970" y="170">4) Residual insert</text>
  <text class="small" x="970" y="195">sorted by timestamp</text>

  <rect class="box" x="430" y="340" width="350" height="120" fill="#ede9fe" stroke="#6d28d9"/>
  <text class="step" x="460" y="386">5) Book state query</text>
  <text class="small" x="460" y="412">GetBestBidPrice / GetBestAskPrice</text>

  <path class="line" d="M 310 180 L 360 180"/>
  <path class="line" d="M 600 180 L 650 180"/>
  <path class="line" d="M 890 180 L 940 180"/>
  <path class="line" d="M 1045 230 C 1045 300, 860 335, 780 370"/>
  <path class="line" d="M 940 180 C 1000 100, 350 100, 190 130"/>
</svg>
