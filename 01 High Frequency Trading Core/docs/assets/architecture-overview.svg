<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">HFT Core Architecture Overview</title>
  <desc id="desc">High-level module relationships for executable, core library, render library, tests, and python bridge.</desc>
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box { rx: 14; ry: 14; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="#f8fafc"/>
  <text class="title" x="40" y="56">HFT Core Modular Architecture</text>

  <rect class="box" x="60" y="120" width="250" height="120" fill="#dbeafe" stroke="#1d4ed8"/>
  <text class="label" x="90" y="168">src/hft_main</text>
  <text class="small" x="90" y="195">CLI simulation & benchmark</text>

  <rect class="box" x="460" y="90" width="290" height="150" fill="#dcfce7" stroke="#15803d"/>
  <text class="label" x="490" y="145">lib/hft_core_lib</text>
  <text class="small" x="490" y="172">matching engine, order book,</text>
  <text class="small" x="490" y="195">price-time priority</text>

  <rect class="box" x="460" y="290" width="290" height="120" fill="#ffedd5" stroke="#c2410c"/>
  <text class="label" x="490" y="342">lib/hft_render_lib</text>
  <text class="small" x="490" y="369">metrics + top-of-book output</text>

  <rect class="box" x="900" y="90" width="250" height="120" fill="#ede9fe" stroke="#6d28d9"/>
  <text class="label" x="930" y="138">tests/hft_tests</text>
  <text class="small" x="930" y="165">Catch2 unit coverage</text>

  <rect class="box" x="900" y="280" width="250" height="130" fill="#fee2e2" stroke="#b91c1c"/>
  <text class="label" x="930" y="330">python_bridge</text>
  <text class="small" x="930" y="357">optional pybind11 module</text>

  <path class="line" d="M 310 170 C 370 170, 400 165, 460 165"/>
  <path class="line" d="M 310 200 C 370 230, 390 320, 460 350"/>
  <path class="line" d="M 750 150 C 810 145, 840 140, 900 140"/>
  <path class="line" d="M 750 350 C 810 350, 840 345, 900 345"/>
</svg>
